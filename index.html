<script>
/* ================================================================
   报税计算器 · 税率5%
   ================================================================ */
var R = 0.05;
var D = 1.05;

/* 工具函数 */
function r2(n) { return Math.round(n * 100) / 100; }
function money(v) {
  if (typeof v === 'number') return isFinite(v) ? v : 0;
  var text = String(v || '')
    .replace(/AED|د\.?إ\.?/gi, '')
    .replace(/[¥￥,\s，]/g, '')
    .replace(/。/g, '.');
  var n = Number(text);
  return isFinite(n) ? n : 0;
}
function fmt(n) {
  if (!n || isNaN(n) || n === 0) return '--';
  return 'AED ' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmn(n) {
  if (!n || isNaN(n) || n === 0) return '--';
  return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

/* 计算：已知报税金额A，求税额T和总金额S */
function fa(A) {
  if (!A || A <= 0) return { A:0, T:0, S:0 };
  var T = r2(A * R);
  var S = r2(A + T);
  return { A:A, T:T, S:S };
}
/* 计算：已知总金额S，反推报税金额A和税额T */
function ft(S) {
  if (!S || S <= 0) return { A:0, T:0, S:0 };
  S = r2(S);
  var A = r2(S / D);
  var T = r2(S - A);
  return { A:A, T:T, S:S };
}

var oMode = 'amt';
var iMode = 'amt';
var lang = 'zh';

var TEXT = {
  zh: {
    pageTitle:'报税计算器 · 税率5%', output:'销项税', input:'进项税', summary:'汇 总',
    outputTitle:'销项税 · 税率5%', inputTitle:'进项税 · 税率5%',
    modeAmt:'输入报税金额(不含税)<br>自动算税额+总额',
    modeTot:'输入总金额(含税)<br>反推报税金额+税额',
    month:'月份', taxable:'报税金额（不含税）', tax:'税额 ×5%', total:'总金额（含税）',

    item:'项目', reset:'清空全部数据', export:'导出数据 CSV', switchLang:'English',
    contact:'如有疑问或其他需求，请发送邮件联系：',
    enterTaxable:'输入报税金额', enterTotal:'输入总金额', auto:'自动计算', reverse:'自动反推',
    monthName:function(m){ return '第' + m + '月'; },
    noTax:'税额相抵，无需缴纳', payTax:'需向税务机关缴纳税款',
    creditTax:'进项大于销项，可留抵或申请退税',
    outputTaxable:'销项-报税金额', outputTaxRow:'销项-税额', outputTotal:'销项-总金额',
    inputTaxable:'进项-报税金额', inputTaxRow:'进项-税额', inputTotal:'进项-总金额',
    exportName:'报税数据'
  },
  en: {
    pageTitle:'UAE TAX CALCULATOR', output:'Output VAT', input:'Input VAT', summary:'Summary',
    outputTitle:'Output VAT · 5%', inputTitle:'Input VAT · 5%',
    modeAmt:'Enter taxable amount (excl. VAT)<br>Calculate VAT + total',
    modeTot:'Enter total amount (incl. VAT)<br>Reverse taxable amount + VAT',
    month:'Month', taxable:'Taxable Amount (Excl. VAT)', tax:'VAT ×5%', total:'Total (Incl. VAT)',
    quarter:'Quarter Total', calcOutput:'Calculate Output VAT', calcInput:'Calculate Input VAT',
    summaryTitle:'Quarterly VAT Summary', outputTax:'Total Output VAT', inputTax:'Total Input VAT',
    netTax:'VAT Payable', refund:'VAT Payable / Refundable This Quarter', detailTitle:'Quarterly Details',
    item:'Item', reset:'Clear All Data', export:'Export CSV', switchLang:'中文',
    contact:'For questions or additional requirements, please contact us by email:',
    enterTaxable:'Enter taxable amount', enterTotal:'Enter total amount', auto:'Auto calculated', reverse:'Auto reversed',
    monthName:function(m){ return 'Month ' + m; },
    noTax:'Output and input VAT offset; no tax payable', payTax:'VAT payment is due',
    creditTax:'Input VAT exceeds output VAT; credit or refund may apply',
    outputTaxable:'Output - Taxable Amount', outputTaxRow:'Output - VAT', outputTotal:'Output - Total',
    inputTaxable:'Input - Taxable Amount', inputTaxRow:'Input - VAT', inputTotal:'Input - Total',
    exportName:'tax-data'
  }
};

function tx(key) { return TEXT[lang][key]; }

function applyLanguage() {
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.title = tx('pageTitle');
  document.getElementById('pageTitle').textContent = tx('pageTitle');
  document.getElementById('tabOutput').textContent = tx('output');
  document.getElementById('tabInput').textContent = tx('input');
  document.getElementById('tabSummary').textContent = tx('summary');
  document.getElementById('outputTitle').textContent = tx('outputTitle');
  document.getElementById('inputTitle').textContent = tx('inputTitle');
  document.getElementById('oModeAmt').innerHTML = tx('modeAmt');
  document.getElementById('oModeTot').innerHTML = tx('modeTot');
  document.getElementById('iModeAmt').innerHTML = tx('modeAmt');
  document.getElementById('iModeTot').innerHTML = tx('modeTot');
  document.querySelectorAll('.monthHead').forEach(function(el){ el.textContent = tx('month'); });
  document.querySelectorAll('.taxableHead').forEach(function(el){ el.textContent = tx('taxable'); });
  document.querySelectorAll('.taxHead').forEach(function(el){ el.textContent = tx('tax'); });
  document.querySelectorAll('.totalHead').forEach(function(el){ el.textContent = tx('total'); });
  document.querySelectorAll('.quarterLabel').forEach(function(el){ el.textContent = tx('quarter'); });
  document.getElementById('calcOutputBtn').textContent = tx('calcOutput');
  document.getElementById('calcInputBtn').textContent = tx('calcInput');

  document.getElementById('summaryOutputTax').textContent = tx('outputTax');
  document.getElementById('summaryInputTax').textContent = tx('inputTax');
  document.getElementById('summaryNetTax').textContent = tx('netTax');
  document.getElementById('refundLabel').textContent = tx('refund');
  document.getElementById('detailTitle').textContent = tx('detailTitle');
  document.getElementById('detailItem').textContent = tx('item');
  document.getElementById('detailQuarter').textContent = tx('quarter');
  document.querySelectorAll('.detailMonth').forEach(function(el, index){ el.textContent = tx('monthName')(index + 1); });
  document.getElementById('resetBtn').textContent = tx('reset');
  document.getElementById('exportBtn').textContent = tx('export');
  document.getElementById('langBtn').textContent = tx('switchLang');
  document.getElementById('contactText').innerHTML = tx('contact') + ' <a href="mailto:wfyanwentian@gmail.com">wfyanwentian@gmail.com</a>';
  for (var M = 1; M <= 3; M++) {
    document.querySelector('#oA' + M).previousElementSibling.textContent = tx('monthName')(M);
    document.querySelector('#iA' + M).previousElementSibling.textContent = tx('monthName')(M);
  }
  applyOMode();
  applyIMode();
  doSum();
}

function toggleLanguage() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLanguage();
}

/* 构建月份行 */
function buildRows() {
  var oh = '', ih = '';
  for (var m = 1; m <= 3; m++) {
    oh += '<div class="mr m4">'
      + '<div class="ml">第' + m + '月</div>'
      + '<input class="ci" id="oA' + m + '" inputmode="decimal" placeholder="报税金额">'
      + '<div class="ctx" id="oT' + m + '">--</div>'
      + '<input class="ci" id="oS' + m + '" inputmode="decimal" placeholder="总金额">'
      + '</div>';
    ih += '<div class="mr m4">'
      + '<div class="ml">第' + m + '月</div>'
      + '<input class="ci" id="iA' + m + '" inputmode="decimal" placeholder="报税金额">'
      + '<div class="ctx" id="iT' + m + '">--</div>'
      + '<input class="ci" id="iS' + m + '" inputmode="decimal" placeholder="总金额">'
      + '</div>';
  }
  document.getElementById('oRows').innerHTML = oh;
  document.getElementById('iRows').innerHTML = ih;
}

/* 应用销项税模式：设置只读 */
function applyOMode() {
  for (var M = 1; M <= 3; M++) {
    var a = document.getElementById('oA' + M);
    var s = document.getElementById('oS' + M);
    if (oMode === 'amt') {
      a.readOnly = false; a.placeholder = tx('enterTaxable');
      s.readOnly = true;  s.placeholder = tx('auto');
    } else {
      a.readOnly = true;  a.placeholder = tx('reverse');
      s.readOnly = false; s.placeholder = tx('enterTotal');
    }
  }
}
function applyIMode() {
  for (var M = 1; M <= 3; M++) {
    var a = document.getElementById('iA' + M);
    var s = document.getElementById('iS' + M);
    if (iMode === 'amt') {
      a.readOnly = false; a.placeholder = tx('enterTaxable');
      s.readOnly = true;  s.placeholder = tx('auto');
    } else {
      a.readOnly = true;  a.placeholder = tx('reverse');
      s.readOnly = false; s.placeholder = tx('enterTotal');
    }
  }
}

/* 销项税计算 */
function oCalc(keepEditingValue, editingMonth) {
  var sA = 0, sT = 0, sS = 0;
  for (var M = 1; M <= 3; M++) {
    var elA = document.getElementById('oA' + M);
    var elS = document.getElementById('oS' + M);
    var elT = document.getElementById('oT' + M);
    var A = 0, T = 0, S = 0;
    if (oMode === 'amt') {
      A = money(elA.value);
      if (A > 0) { var r = fa(A); T = r.T; S = r.S; }
    } else {
      S = money(elS.value);
      if (S > 0) { var r = ft(S); A = r.A; T = r.T; }
    }
    if (A > 0) {
      if (!(keepEditingValue && editingMonth === M && oMode === 'amt')) {
        elA.value = (oMode === 'tot') ? A.toFixed(2) : elA.value;
      }
      elT.textContent = fmn(T);
      if (!(keepEditingValue && editingMonth === M && oMode === 'tot')) {
        elS.value = S.toFixed(2);
      }
    } else {
      if (oMode === 'tot') elA.value = '';
      elT.textContent = '--';
      if (oMode === 'amt') elS.value = '';
    }
    sA += A; sT += T; sS += S;
  }
  document.getElementById('oSA').textContent = fmn(sA);
  document.getElementById('oST').textContent = fmt(sT);
  document.getElementById('oSS').textContent = fmt(sS);
  doSum();
}

/* 汇总 */
function doSum() {
  var oT = money(document.getElementById('oST').textContent);
  var iT = money(document.getElementById('iST').textContent);
  var net = r2(oT - iT);
  document.getElementById('fOT').textContent = fmt(oT);
  document.getElementById('fIT').textContent = fmt(iT);
  document.getElementById('fNT').textContent = fmt(net);
  document.getElementById('fBig').textContent = fmt(net);
  var h = document.getElementById('fHint');
  if (Math.abs(net) < 0.01) {
    h.textContent = tx('noTax');
    h.style.color = '#f59e0b';
    document.getElementById('fBig').style.color = '#f59e0b';
  } else if (net > 0) {
    h.textContent = tx('payTax');
    h.style.color = '#ef4444';
    document.getElementById('fBig').style.color = '#ef4444';
  } else {
    h.textContent = tx('creditTax');
    h.style.color = '#34d399';
    document.getElementById('fBig').style.color = '#34d399';
  }
  /* 明细表 */
  var H = '';
  H += '<tr><td style="color:#38bdf8">' + tx('outputTaxable') + '</td>';
  for (var M = 1; M <= 3; M++) {
    var v = money(document.getElementById('oA' + M).value);
    H += '<td>' + fmn(v) + '</td>';
  }
  H += '<td style="color:#38bdf8;font-weight:700">' + fmn(money(document.getElementById('oSA').textContent)) + '</td></tr>';
  H += '<tr><td style="color:#f59e0b">' + tx('outputTaxRow') + '</td>';
  for (var M = 1; M <= 3; M++) {
    var t = money(document.getElementById('oT' + M).textContent);
    H += '<td>' + (t > 0 ? fmn(t) : '--') + '</td>';
  }
  H += '<td style="color:#f59e0b;font-weight:700">' + document.getElementById('oST').textContent + '</td></tr>';
  H += '<tr><td style="color:#38bdf8">' + tx('outputTotal') + '</td>';
  for (var M = 1; M <= 3; M++) {
    var s = money(document.getElementById('oS' + M).value);
    H += '<td>' + (s > 0 ? fmn(s) : '--') + '</td>';
  }
  H += '<td style="color:#38bdf8;font-weight:700">' + document.getElementById('oSS').textContent + '</td></tr>';
  H += '<tr><td style="color:#ef4444">' + tx('inputTaxable') + '</td>';
  for (var M = 1; M <= 3; M++) {
    var v = money(document.getElementById('iA' + M).value);
    H += '<td>' + fmn(v) + '</td>';
  }
  H += '<td style="color:#ef4444;font-weight:700">' + fmn(money(document.getElementById('iSA').textContent)) + '</td></tr>';
  H += '<tr><td style="color:#f59e0b">' + tx('inputTaxRow') + '</td>';
  for (var M = 1; M <= 3; M++) {
    var t = money(document.getElementById('iT' + M).textContent);
    H += '<td>' + (t > 0 ? fmn(t) : '--') + '</td>';
  }
  H += '<td style="color:#f59e0b;font-weight:700">' + document.getElementById('iST').textContent + '</td></tr>';
  H += '<tr><td style="color:#ef4444">' + tx('inputTotal') + '</td>';
  for (var M = 1; M <= 3; M++) {
    var s = money(document.getElementById('iS' + M).value);
    H += '<td>' + (s > 0 ? fmn(s) : '--') + '</td>';
  }
  H += '<td style="color:#ef4444;font-weight:700">' + document.getElementById('iSS').textContent + '</td></tr>';
  document.getElementById('dtb').innerHTML = H;
  saveData();
}

/* 模式切换 */
function setOMode(mode) {
  oMode = mode;
  var btns = document.getElementById('oms').querySelectorAll('button');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('a', btns[i].dataset.mode === mode);

  applyOMode();

}
function setIMode(mode) {

    btns[i].classList.toggle('a', btns[i].dataset.mode === mode);
  }

/* Tab切换 */
function switchTab(tab) {
  var panels = document.querySelectorAll('.p');
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove('a');
  document.getElementById('panel-' + tab).classList.add('a');
  var btns = document.querySelectorAll('.tb');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('a', btns[i].dataset.tab === tab);
  }
  if (tab === 'summary') doSum();
}

/* 导出当前数据为 CSV */
function exportData() {
  oCalc();
  iCalc();
  var rows = [[tx('item'), tx('monthName')(1), tx('monthName')(2), tx('monthName')(3), tx('quarter')]];
  function addRow(label, prefix, field) {
    var values = [];
    for (var M = 1; M <= 3; M++) {
      var id = prefix + field + M;
      values.push(money(document.getElementById(id).value || document.getElementById(id).textContent));
    }
    rows.push([label].concat(values).concat([r2(values[0] + values[1] + values[2])]));
  }
  addRow(tx('outputTaxable'), 'o', 'A');
  addRow(tx('outputTaxRow'), 'o', 'T');
  addRow(tx('outputTotal'), 'o', 'S');
  addRow(tx('inputTaxable'), 'i', 'A');
  addRow(tx('inputTaxRow'), 'i', 'T');
  addRow(tx('inputTotal'), 'i', 'S');
  rows.push([]);
  rows.push([tx('outputTax'), money(document.getElementById('oST').textContent)]);
  rows.push([tx('inputTax'), money(document.getElementById('iST').textContent)]);
  rows.push([tx('netTax'), money(document.getElementById('fNT').textContent)]);
  var csv = '\uFEFF' + rows.map(function(row) {
    return row.map(function(value) {
      var text = String(value == null ? '' : value);
      return '"' + text.replace(/"/g, '""') + '"';
    }).join(',');
  }).join('\r\n');
  var blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  var date = new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = tx('exportName') + '-' + date + '.csv';
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

/* 持久化 */
function saveData() {
  var d = { oMode: oMode, iMode: iMode, lang: lang };
  for (var M = 1; M <= 3; M++) {
    d['oA' + M] = document.getElementById('oA' + M).value;
    d['oS' + M] = document.getElementById('oS' + M).value;
    d['iA' + M] = document.getElementById('iA' + M).value;
    d['iS' + M] = document.getElementById('iS' + M).value;
  }
  try {
    localStorage.setItem('tax5', JSON.stringify(d));
  } catch (e) {}
}
function loadData() {
  try {
    var raw = localStorage.getItem('tax5');
    if (!raw) return;
    var d = JSON.parse(raw);
    if (d.oMode) oMode = d.oMode;
    if (d.iMode) iMode = d.iMode;
    if (d.lang === 'zh' || d.lang === 'en') lang = d.lang;
    var ob = document.getElementById('oms').querySelectorAll('button');
    for (var i = 0; i < ob.length; i++) ob[i].classList.toggle('a', ob[i].dataset.mode === oMode);
    var ib = document.getElementById('ims').querySelectorAll('button');
    for (var i = 0; i < ib.length; i++) ib[i].classList.toggle('a', ib[i].dataset.mode === iMode);
    applyOMode();
    applyIMode();
    for (var M = 1; M <= 3; M++) {
      if (d['oA' + M]) document.getElementById('oA' + M).value = d['oA' + M];
      if (d['oS' + M]) document.getElementById('oS' + M).value = d['oS' + M];
      if (d['iA' + M]) document.getElementById('iA' + M).value = d['iA' + M];
      if (d['iS' + M]) document.getElementById('iS' + M).value = d['iS' + M];
    }
  } catch (e) {}
}

function resetAll() {
  for (var M = 1; M <= 3; M++) {
    document.getElementById('oA' + M).value = '';
    document.getElementById('oS' + M).value = '';
    document.getElementById('oT' + M).textContent = '--';
    document.getElementById('iA' + M).value = '';
    document.getElementById('iS' + M).value = '';
    document.getElementById('iT' + M).textContent = '--';
  }
  try {
    localStorage.removeItem('tax5');
  } catch (e) {}
  oCalc(); iCalc();
}

/* 初始化 */
buildRows();

document.querySelectorAll('.tb').forEach(function(btn) {
  btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
});

document.getElementById('oms').querySelectorAll('button').forEach(function(btn) {
  btn.addEventListener('click', function() { setOMode(this.dataset.mode); });
});
document.getElementById('ims').querySelectorAll('button').forEach(function(btn) {
  btn.addEventListener('click', function() { setIMode(this.dataset.mode); });
});

/* 输入时即时计算；离开输入框时统一格式化为两位小数 */
for (var m = 1; m <= 3; m++) {
  (function(M) {
    document.getElementById('oA' + M).addEventListener('input', function() { oCalc(true, M); });
    document.getElementById('oS' + M).addEventListener('input', function() { oCalc(true, M); });
    document.getElementById('iA' + M).addEventListener('input', function() { iCalc(true, M); });
    document.getElementById('iS' + M).addEventListener('input', function() { iCalc(true, M); });
    document.getElementById('oA' + M).addEventListener('blur', function() { oCalc(); });
    document.getElementById('oS' + M).addEventListener('blur', function() { oCalc(); });
    document.getElementById('iA' + M).addEventListener('blur', function() { iCalc(); });
    document.getElementById('iS' + M).addEventListener('blur', function() { iCalc(); });
  })(m);
}

loadData();
applyLanguage();
oCalc();
iCalc();
